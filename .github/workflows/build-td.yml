name: Build TDLib

on:
  push:
    branches:
      - build-td

  workflow_dispatch:
    inputs:
      build-android:
        description: 'Build Android'
        required: false
        type: boolean
        default: false

      build-jvm:
        description: 'Build JVM'
        required: false
        type: boolean
        default: false

      build-ios:
        description: 'Build iOS'
        required: false
        type: boolean
        default: false

      build-macos:
        description: 'Build macOS'
        required: false
        type: boolean
        default: false

      build-windows:
        description: 'Build Windows'
        required: false
        type: boolean
        default: false

      build-linux:
        description: 'Build Linux'
        required: false
        type: boolean
        default: false

jobs:
  run-generator:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: true

      - name: Clean submodule
        run: |
          cd td
          git clean -ffdx

      - name: Set up Java
        uses: ./.github/actions/set-up-java

      - name: Assemble generator
        run: ./gradlew tdl-coroutines-generator:assemble

      - name: Run generator
        run: ./gradlew tdl-coroutines-generator:run

      - name: Dump API
        run: ./gradlew :tdl-coroutines:updateKotlinAbi

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: Update API [skip ci]
          add: |
            - tdl-coroutines
            - README.md

  build-android:
    if: github.event_name == 'push' || inputs.build-android
    needs: run-generator
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Clean submodule
        run: |
          cd td
          git clean -ffdx

      - name: Set up Java
        uses: ./.github/actions/set-up-java

      - name: Set up dependencies
        run: brew install cmake coreutils gperf openssl php

      - name: Check environment
        run: |
          cd td/example/android
          ./check-environment.sh

      - name: Fetch Android SDK
        run: |
          cd td/example/android
          ./fetch-sdk.sh

      - name: Build OpenSSL
        run: |
          cd td/example/android
          ./build-openssl.sh

      - name: Build TDLib
        run: |
          cd td/example/android
          ./build-tdlib.sh '' '' '' '' 'JSONJava'

      - name: SHA256 checksums
        run: shasum -a 256 td/example/android/tdlib/libs/*/*.so

      - name: Copy files
        run: |
          rm -rf tdl-coroutines/generated/android
          mkdir -p tdl-coroutines/generated/android
          cp -r td/example/android/tdlib/libs/* tdl-coroutines/generated/android

      - name: Verify
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: arm64-v8a
          script: |
            ./gradlew :example:verification:app:android:installDebug
            adb logcat -c
            adb shell am start -n dev.g000sha256.tdl.example.verification.app.android/.MainActivity
            bash .github/scripts/wait-for-android-verification.sh

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for Android [skip ci]
          add: tdl-coroutines

  build-jvm-linux-arm64:
    if: github.event_name == 'push' || inputs.build-jvm
    needs: run-generator
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Set up Java
        uses: ./.github/actions/set-up-java

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          tools: none

      - name: Set up dependencies
        run: sudo apt-get install make git zlib1g-dev libssl-dev gperf cmake g++

      - name: Build TDLib
        run: |
          cd td
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../example/java/td -DTD_ENABLE_JNI=ON ..
          cmake --build . --target install
          cd ../example/java
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../../../tdlib -DTd_DIR:PATH=$(readlink -e ../td/lib/cmake/Td) -DTD_JSON_JAVA=ON ..
          cmake --build . --target install

      - name: SHA256 checksums
        run: shasum -a 256 td/tdlib/bin/*.so

      - name: Copy files
        run: |
          rm -rf tdl-coroutines/generated/jvm/linux/arm64
          mkdir -p tdl-coroutines/generated/jvm/linux/arm64
          cp td/tdlib/bin/*.so tdl-coroutines/generated/jvm/linux/arm64

      - name: Verify
        run: ./gradlew :example:verification:app:jvm:run

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for JVM Linux Arm64 [skip ci]
          add: tdl-coroutines

  build-jvm-linux-x64:
    if: github.event_name == 'push' || inputs.build-jvm
    needs: run-generator
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Set up Java
        uses: ./.github/actions/set-up-java

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          tools: none

      - name: Set up dependencies
        run: sudo apt-get install make git zlib1g-dev libssl-dev gperf cmake g++

      - name: Build TDLib
        run: |
          cd td
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../example/java/td -DTD_ENABLE_JNI=ON ..
          cmake --build . --target install
          cd ../example/java
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../../../tdlib -DTd_DIR:PATH=$(readlink -e ../td/lib/cmake/Td) -DTD_JSON_JAVA=ON ..
          cmake --build . --target install

      - name: SHA256 checksums
        run: shasum -a 256 td/tdlib/bin/*.so

      - name: Copy files
        run: |
          rm -rf tdl-coroutines/generated/jvm/linux/x64
          mkdir -p tdl-coroutines/generated/jvm/linux/x64
          cp td/tdlib/bin/*.so tdl-coroutines/generated/jvm/linux/x64

      - name: Verify
        run: ./gradlew :example:verification:app:jvm:run

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for JVM Linux x64 [skip ci]
          add: tdl-coroutines

  build-jvm-macos-arm64:
    if: github.event_name == 'push' || inputs.build-jvm
    needs: run-generator
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Clean submodule
        run: |
          cd td
          git clean -ffdx

      - name: Set up dependencies
        run: brew install gperf cmake openssl coreutils openjdk

      - name: Build TDLib
        run: |
          cd td
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME=/opt/homebrew/opt/openjdk/libexec/openjdk.jdk/Contents/Home/ -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl/ -DCMAKE_INSTALL_PREFIX:PATH=../example/java/td -DTD_ENABLE_JNI=ON ..
          cmake --build . --target install
          cd ../example/java
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME=/opt/homebrew/opt/openjdk/libexec/openjdk.jdk/Contents/Home/ -DCMAKE_INSTALL_PREFIX:PATH=../../../tdlib -DTd_DIR:PATH=$(greadlink -e ../td/lib/cmake/Td) -DTD_JSON_JAVA=ON ..
          cmake --build . --target install

      - name: SHA256 checksums
        run: shasum -a 256 td/tdlib/bin/*.dylib

      - name: Copy files
        run: |
          rm -rf tdl-coroutines/generated/jvm/macos/arm64
          mkdir -p tdl-coroutines/generated/jvm/macos/arm64
          cp td/tdlib/bin/*.dylib tdl-coroutines/generated/jvm/macos/arm64

      - name: Verify
        run: ./gradlew :example:verification:app:jvm:run

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for JVM macOS Arm64 [skip ci]
          add: tdl-coroutines

  build-jvm-macos-x64:
    if: github.event_name == 'push' || inputs.build-jvm
    needs: run-generator
    runs-on: macos-15-intel
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Set up dependencies
        run: brew install gperf cmake openssl coreutils openjdk

      - name: Build TDLib
        run: |
          cd td
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME=/usr/local/opt/openjdk/libexec/openjdk.jdk/Contents/Home/ -DOPENSSL_ROOT_DIR=/usr/local/opt/openssl/ -DCMAKE_INSTALL_PREFIX:PATH=../example/java/td -DTD_ENABLE_JNI=ON ..
          cmake --build . --target install
          cd ../example/java
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME=/usr/local/opt/openjdk/libexec/openjdk.jdk/Contents/Home/ -DCMAKE_INSTALL_PREFIX:PATH=../../../tdlib -DTd_DIR:PATH=$(greadlink -e ../td/lib/cmake/Td) -DTD_JSON_JAVA=ON ..
          cmake --build . --target install

      - name: SHA256 checksums
        run: shasum -a 256 td/tdlib/bin/*.dylib

      - name: Copy files
        run: |
          rm -rf tdl-coroutines/generated/jvm/macos/x64
          mkdir -p tdl-coroutines/generated/jvm/macos/x64
          cp td/tdlib/bin/*.dylib tdl-coroutines/generated/jvm/macos/x64

      - name: Verify
        run: ./gradlew :example:verification:app:jvm:run

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for JVM macOS x64 [skip ci]
          add: tdl-coroutines

  build-jvm-windows-arm64:
    if: github.event_name == 'push' || inputs.build-jvm
    needs: run-generator
    runs-on: windows-11-arm
    permissions:
      contents: write

    env:
      SOURCE_DATE_EPOCH: "1"
      VCPKG_KEEP_ENV_VARS: "SOURCE_DATE_EPOCH"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Set up dependencies
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.bat
          $triplet = "triplets/arm64-windows.cmake"
          Add-Content $triplet "`nset(VCPKG_LINKER_FLAGS `"/Brepro`")"
          ./vcpkg.exe install gperf:arm64-windows openssl:arm64-windows zlib:arm64-windows

      - name: Build TDLib
        run: |
          cd td
          mkdir build
          cd build
          cmake -A ARM64 -DCMAKE_INSTALL_PREFIX:PATH=../example/java/td -DTD_ENABLE_JNI=ON -DCMAKE_TOOLCHAIN_FILE:FILEPATH=../../vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_SHARED_LINKER_FLAGS="/Brepro" ..
          cmake --build . --target install --config Release
          cd ../example/java
          mkdir build
          cd build
          cmake -A ARM64 -DCMAKE_INSTALL_PREFIX:PATH=../../../tdlib -DCMAKE_TOOLCHAIN_FILE:FILEPATH=../../../../vcpkg/scripts/buildsystems/vcpkg.cmake -DTd_DIR:PATH=$(Resolve-Path ../td/lib/cmake/Td) -DTD_JSON_JAVA=ON -DCMAKE_SHARED_LINKER_FLAGS="/Brepro" ..
          cmake --build . --target install --config Release

      - name: SHA256 checksums
        run: Get-FileHash td/tdlib/bin/*.dll -Algorithm SHA256

      - name: Copy files
        run: |
          Remove-Item -ErrorAction SilentlyContinue -Recurse tdl-coroutines/generated/jvm/windows/arm64
          New-Item -Force -ItemType Directory -Path tdl-coroutines/generated/jvm/windows/arm64
          Copy-Item td/tdlib/bin/*.dll -Destination tdl-coroutines/generated/jvm/windows/arm64

      - name: Set up Java
        uses: ./.github/actions/set-up-java

      - name: Verify
        shell: bash
        run: ./gradlew :example:verification:app:jvm:run

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for JVM Windows Arm64 [skip ci]
          add: tdl-coroutines

  build-jvm-windows-x64:
    if: github.event_name == 'push' || inputs.build-jvm
    needs: run-generator
    runs-on: windows-2025
    permissions:
      contents: write

    env:
      SOURCE_DATE_EPOCH: "1"
      VCPKG_KEEP_ENV_VARS: "SOURCE_DATE_EPOCH"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Set up dependencies
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.bat
          $triplet = "triplets/x64-windows.cmake"
          Add-Content $triplet "`nset(VCPKG_LINKER_FLAGS `"/Brepro`")"
          ./vcpkg.exe install gperf:x64-windows openssl:x64-windows zlib:x64-windows

      - name: Build TDLib
        run: |
          cd td
          mkdir build
          cd build
          cmake -A x64 -DCMAKE_INSTALL_PREFIX:PATH=../example/java/td -DTD_ENABLE_JNI=ON -DCMAKE_TOOLCHAIN_FILE:FILEPATH=../../vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_SHARED_LINKER_FLAGS="/Brepro" ..
          cmake --build . --target install --config Release
          cd ../example/java
          mkdir build
          cd build
          cmake -A x64 -DCMAKE_INSTALL_PREFIX:PATH=../../../tdlib -DCMAKE_TOOLCHAIN_FILE:FILEPATH=../../../../vcpkg/scripts/buildsystems/vcpkg.cmake -DTd_DIR:PATH=$(Resolve-Path ../td/lib/cmake/Td) -DTD_JSON_JAVA=ON -DCMAKE_SHARED_LINKER_FLAGS="/Brepro" ..
          cmake --build . --target install --config Release

      - name: SHA256 checksums
        run: Get-FileHash td/tdlib/bin/*.dll -Algorithm SHA256

      - name: Copy files
        run: |
          Remove-Item -ErrorAction SilentlyContinue -Recurse tdl-coroutines/generated/jvm/windows/x64
          New-Item -Force -ItemType Directory -Path tdl-coroutines/generated/jvm/windows/x64
          Copy-Item td/tdlib/bin/*.dll -Destination tdl-coroutines/generated/jvm/windows/x64

      - name: Set up Java
        uses: ./.github/actions/set-up-java

      - name: Verify
        shell: bash
        run: ./gradlew :example:verification:app:jvm:run

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for JVM Windows x64 [skip ci]
          add: tdl-coroutines

  build-windows-x64:
    if: github.event_name == 'push' || inputs.build-windows
    needs: run-generator
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gperf
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib

      - name: Build TDLib Native
        shell: msys2 {0}
        run: |
          cd td
          mkdir build
          cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../tdlib -DOPENSSL_USE_STATIC_LIBS=TRUE -DCMAKE_C_FLAGS=-std=gnu17 ..
          cmake --build . --target install

      - name: SHA256 checksums
        shell: msys2 {0}
        run: |
          sha256sum td/tdlib/lib/*.a

      - name: Copy files
        shell: msys2 {0}
        run: |
          DEST="tdl-coroutines/generated/windows/x64"
          rm -rf "$DEST"
          mkdir -p "$DEST/include/td/telegram"
          mkdir -p "$DEST/libs"
          
          cp td/tdlib/include/td/telegram/td_json_client.h "$DEST/include/td/telegram/"
          cp td/tdlib/include/td/telegram/tdjson_export.h "$DEST/include/td/telegram/"
          find td/tdlib/lib/ -name "*.a" ! -name "libtdjson.dll.a" -exec cp {} "$DEST/libs/" \;
          cp /mingw64/lib/libssl.a "$DEST/libs/"
          cp /mingw64/lib/libcrypto.a "$DEST/libs/"
          cp /mingw64/lib/libz.a "$DEST/libs/"

      - name: Set up Java
        uses: ./.github/actions/set-up-java

      - name: Verify
        shell: bash
        run: ./gradlew :example:verification:app:windows:runReleaseExecutableMingwX64

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for Windows x64 [skip ci]
          add: tdl-coroutines

  build-linux-x64:
    if: github.event_name == 'push' || inputs.build-linux
    needs: run-generator
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gperf php-cli g++ libssl-dev zlib1g-dev

      - name: Build TDLib Native
        run: |
          cd td
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../tdlib ..
          cmake --build . --target install

      - name: SHA256 checksums
        run: shasum -a 256 td/tdlib/lib/*.a

      - name: Copy files
        run: |
          DEST="tdl-coroutines/generated/linux/x64"
          rm -rf "$DEST"
          mkdir -p "$DEST/include/td/telegram"
          mkdir -p "$DEST/libs"

          cp td/tdlib/include/td/telegram/td_json_client.h "$DEST/include/td/telegram/"
          cp td/tdlib/include/td/telegram/tdjson_export.h "$DEST/include/td/telegram/"
          cp td/tdlib/lib/*.a "$DEST/libs/"

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for Linux x64 [skip ci]
          add: tdl-coroutines

  build-linux-arm64:
    if: github.event_name == 'push' || inputs.build-linux
    needs: run-generator
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gperf php-cli g++ libssl-dev zlib1g-dev

      - name: Build TDLib Native
        run: |
          cd td
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../tdlib ..
          cmake --build . --target install

      - name: SHA256 checksums
        run: shasum -a 256 td/tdlib/lib/*.a

      - name: Copy files
        run: |
          DEST="tdl-coroutines/generated/linux/arm64"
          rm -rf "$DEST"
          mkdir -p "$DEST/include/td/telegram"
          mkdir -p "$DEST/libs"

          cp td/tdlib/include/td/telegram/td_json_client.h "$DEST/include/td/telegram/"
          cp td/tdlib/include/td/telegram/tdjson_export.h "$DEST/include/td/telegram/"
          cp td/tdlib/lib/*.a "$DEST/libs/"

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for Linux Arm64 [skip ci]
          add: tdl-coroutines

  build-ios-arm64:
    if: github.event_name == 'push' || inputs.build-ios
    needs: run-generator
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Clean submodule
        run: |
          cd td
          git clean -ffdx

      - name: Set up dependencies
        run: brew install gperf cmake coreutils

      - name: Apply patch
        run: git apply .github/patches/ios-arm64.patch

      - name: Build OpenSSL
        run: |
          cd td/example/ios
          ./build-openssl.sh

      - name: Build TDLib
        run: |
          cd td
          mkdir build
          cd build
          cmake -DTD_GENERATE_SOURCE_FILES=ON ..
          cmake --build .
          cd ../example/ios
          ./build.sh

      - name: SHA256 checksums
        run: |
          shasum -a 256 td/example/ios/build/install-iOS/lib/*.a
          shasum -a 256 td/example/ios/third_party/openssl/iOS/lib/*.a

      - name: Copy files
        run: |
          rm -rf tdl-coroutines/generated/ios/arm64
          mkdir -p tdl-coroutines/generated/ios/arm64/include/td/telegram
          mkdir -p tdl-coroutines/generated/ios/arm64/libs
          cp td/example/ios/build/install-iOS/include/td/telegram/td_json_client.h tdl-coroutines/generated/ios/arm64/include/td/telegram
          cp td/example/ios/build/install-iOS/include/td/telegram/tdjson_export.h tdl-coroutines/generated/ios/arm64/include/td/telegram
          cp td/example/ios/build/install-iOS/lib/*.a tdl-coroutines/generated/ios/arm64/libs
          cp td/example/ios/third_party/openssl/iOS/lib/*.a tdl-coroutines/generated/ios/arm64/libs

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: TDLib for iOS Arm64 [skip ci]
          add: tdl-coroutines

  build-ios-arm64-simulator:
    if: github.event_name == 'push' || inputs.build-ios
    needs: run-generator
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true
          submodules: true

      - name: Clean submodule
        run: |
          cd td
          git clean -ffdx

      - name: Set up dependencies
        run: brew install gperf cmake coreutils

      - name: Apply patch
        run: git apply .github/patches/ios-arm64-simulator.patch

      - name: Build OpenSSL
        run: |
          cd td/example/ios
          ./build-openssl.sh

      - name: Build TDLib
        run: |
          cd td
          mkdir build
          cd build
          cmake -DTD_GENERATE_SOURCE_FILES=ON ..
          cmake --build .
          cd ../example/ios
          ./build.sh

      - name: SHA256 checksums
        run: |
          shasum -a 256 td/example/ios/build/install-iOS-simulator/lib/*.a
          shasum -a 256 td/example/ios/third_party/openssl/iOS-simulator/lib/*.a

      - name: Copy files
        run: |
          rm -rf tdl-coroutines/generated/ios/arm64Simulator
          mkdir -p tdl-coroutines/generated/ios/arm64Simulator/include/td/telegram
          mkdir -p tdl-coroutines/generated/ios/arm64Simulator/libs
